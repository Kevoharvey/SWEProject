{% extends 'base.html' %}
{% block title %}Add Product - FarmFresh{% endblock %}
{% block content %}
<div class="page-header">
    <div class="container"><h1><i class="fas fa-plus-circle"></i> Add New Product</h1></div>
</div>
<div class="container" style="max-width:800px;">
    <div class="card" style="padding:32px;">
        <form method="POST" enctype="multipart/form-data">
            <div class="form-row">
                <div class="form-group">
                    <label>Product Name *</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Category *</label>
                    <select name="category" class="form-control" required>
                        {% for c in categories %}<option>{{ c }}</option>{% endfor %}
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" class="form-control" rows="3"></textarea>
            </div>
            <div class="form-row" style="grid-template-columns:1fr 1fr 1fr;">
                <div class="form-group">
                    <label>Price ($) *</label>
                    <input type="number" name="price" class="form-control" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label>Quantity *</label>
                    <input type="number" name="quantity" class="form-control" min="0" required>
                </div>
                <div class="form-group">
                    <label>Unit *</label>
                    <select name="unit" class="form-control" required>
                        {% for u in units %}<option>{{ u }}</option>{% endfor %}
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Harvest Date</label>
                    <input type="date" name="harvest_date" class="form-control">
                </div>
                <div class="form-group">
                    <label>Stock Status</label>
                    <select name="stock_status" class="form-control">
                        <option value="in-stock">In Stock</option>
                        <option value="low-stock">Low Stock</option>
                        <option value="sold-out">Sold Out</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Photos (up to 3)</label>
                <div class="form-row" style="grid-template-columns:1fr 1fr 1fr;">
                    <input type="file" name="photo_0" class="form-control" accept="image/*">
                    <input type="file" name="photo_1" class="form-control" accept="image/*">
                    <input type="file" name="photo_2" class="form-control" accept="image/*">
                </div>
            </div>
            <div class="form-group">
                <label>Weekly Availability</label>
                <div style="display:flex;flex-wrap:wrap;gap:12px;">
                    {% for d in ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'] %}
                    <label class="form-check" style="min-width:120px;">
                        <input type="checkbox" name="avail_{{ d }}" checked> {{ d }}
                    </label>
                    {% endfor %}
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-lg"><i class="fas fa-plus"></i> Add Product</button>
            <a href="{{ url_for('farmer.products') }}" class="btn btn-outline btn-lg" style="margin-left:8px;">Cancel</a>
        </form>
    </div>
</div>
<div style="height:40px;"></div>
{% endblock %}
