{% extends 'base.html' %}
{% block title %}Register - FarmFresh{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card" style="max-width:580px;">
        <h2><i class="fas fa-user-plus" style="color:var(--primary)"></i> Create Account</h2>
        <p class="subtitle">Join the FarmFresh community</p>
        <form method="POST" action="{{ url_for('auth.register') }}" enctype="multipart/form-data">
            <div class="form-row">
                <div class="form-group">
                    <label for="full_name">Full Name</label>
                    <input type="text" id="full_name" name="full_name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" class="form-control" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" minlength="6" required>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-control" required>
                </div>
            </div>
            <div class="form-group">
                <label>I am a...</label>
                <div style="display:flex;gap:12px;">
                    <label style="flex:1;display:flex;align-items:center;gap:8px;padding:12px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition);" id="role-buyer-label">
                        <input type="radio" name="role" value="buyer" checked onchange="toggleFarmerFields()"> <i class="fas fa-shopping-bag"></i> Buyer
                    </label>
                    <label style="flex:1;display:flex;align-items:center;gap:8px;padding:12px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition);" id="role-farmer-label">
                        <input type="radio" name="role" value="farmer" onchange="toggleFarmerFields()"> <i class="fas fa-tractor"></i> Farmer
                    </label>
                </div>
            </div>
            <div id="farmer-fields" style="display:none;">
                <div class="form-group">
                    <label for="farm_name">Farm Name</label>
                    <input type="text" id="farm_name" name="farm_name" class="form-control">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="phone">Phone</label>
                        <input type="text" id="phone" name="phone" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="address">Farm Address</label>
                        <input type="text" id="address" name="address" class="form-control">
                    </div>
                </div>
                <div class="form-group">
                    <label for="description">About Your Farm</label>
                    <textarea id="description" name="description" class="form-control" rows="3"></textarea>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg mt-2"><i class="fas fa-user-plus"></i> Create Account</button>
        </form>
        <p class="text-center mt-3" style="color:var(--text-light);">
            Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function toggleFarmerFields() {
    const isFarmer = document.querySelector('input[name="role"][value="farmer"]').checked;
    document.getElementById('farmer-fields').style.display = isFarmer ? 'block' : 'none';
}
</script>
{% endblock %}
