{% extends 'base.html' %}
{% block title %}Reset Password - FarmFresh{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2><i class="fas fa-key" style="color:var(--primary)"></i> Reset Password</h2>
        <p class="subtitle">Enter your email and new password to reset it</p>
        <form method="POST" action="{{ url_for('auth.forgot_password') }}">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" class="form-control" placeholder="••••••••" minlength="6" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg mt-2"><i class="fas fa-check"></i> Reset Password</button>
        </form>
        <p class="text-center mt-3" style="color:var(--text-light);">
            Remembered your password? <a href="{{ url_for('auth.login') }}">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
