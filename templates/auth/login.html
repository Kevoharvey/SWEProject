{% extends 'base.html' %}
{% block title %}Login - FarmFresh{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2><i class="fas fa-leaf" style="color:var(--primary)"></i> Welcome Back</h2>
        <p class="subtitle">Sign in to your FarmFresh account</p>
        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg mt-2"><i class="fas fa-sign-in-alt"></i> Sign In</button>
        </form>
        <p class="text-center mt-3" style="color:var(--text-light);">
            Don't have an account? <a href="{{ url_for('auth.register') }}">Create one</a>
        </p>
    </div>
</div>
{% endblock %}
