{% extends 'base.html' %}
{% block title %}Write Review - FarmFresh{% endblock %}
{% block content %}
<div class="page-header">
    <div class="container"><h1><i class="fas fa-star"></i> Write a Review</h1><p>Order #{{ order.id }}</p></div>
</div>
<div class="container" style="max-width:600px;">
    <div class="card" style="padding:32px;">
        <form method="POST">
            <div class="form-group">
                <label>Select Farmer</label>
                <select name="farmer_id" class="form-control" required>
                    {% for f in farmers %}<option value="{{ f.id }}">{{ f.farm_name }}</option>{% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Rating</label>
                <div id="star-rating" style="font-size:2rem;cursor:pointer;color:var(--border);">
                    {% for i in range(1, 6) %}
                    <span data-value="{{ i }}" onclick="setRating({{ i }})" onmouseover="hoverRating({{ i }})" onmouseout="resetRating()">★</span>
                    {% endfor %}
                </div>
                <input type="hidden" name="rating" id="rating-input" value="5" required>
            </div>
            <div class="form-group">
                <label>Your Review</label>
                <textarea name="comment" class="form-control" rows="4" placeholder="Share your experience..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary btn-lg"><i class="fas fa-paper-plane"></i> Submit Review</button>
            <a href="{{ url_for('buyer.orders') }}" class="btn btn-outline btn-lg" style="margin-left:8px;">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
let currentRating = 5;
function setRating(v) { currentRating = v; document.getElementById('rating-input').value = v; updateStars(v); }
function hoverRating(v) { updateStars(v); }
function resetRating() { updateStars(currentRating); }
function updateStars(v) { document.querySelectorAll('#star-rating span').forEach((s, i) => { s.style.color = i < v ? 'var(--accent)' : 'var(--border)'; }); }
updateStars(5);
</script>
{% endblock %}
